# https://taskfile.dev

version: '3'

dotenv:
  - .env

tasks:
  default:
    cmds:
      - task -l

  # ----- 初期化関連コマンド
  init:
    desc: '環境初期化(何度でも実行可能 - 環境を壊してしまった場合、本コマンドの再実行で修復可能)'
    cmds:
      - task: gen-env
      - task: clear
      - docker compose build
      - npm ci
      - echo -e "\e[1;33m📊 データベースを起動しています...\e[0m"
      - docker compose up db -d
      - echo -e "\e[1;33mデータベースの起動を待機中...\e[0m"
      - sleep 5
      - task: db:setup
      - echo -e "\e[1;32m✨ 初期化が完了しました！\e[0m"
      - echo -e "\e[1;33m次のコマンドで開発サーバーを起動してください:\e[0m"
      - echo -e "  task dev"

  # ----- 起動コマンド

  dev:
    desc: '開発サーバーを起動（DBも自動起動）'
    cmds:
      - docker compose up db -d
      - echo -e "\e[1;33mデータベースの起動を待機中...\e[0m"
      - sleep 3
      - npm run dev

  up:
    desc: 'Docker Composeで全サービスを起動'
    cmds:
      - docker compose up --build

  down:
    desc: 'Docker Composeで全サービスを停止'
    cmds:
      - docker compose down

  # ----- データベース関連コマンド

  db:setup:
    desc: 'データベースの初期セットアップ（スキーマ適用 + シードデータ投入）'
    cmds:
      - echo -e "\e[1;33m📊 データベースをセットアップしています...\e[0m"
      - task: db:push
      - task: db:seed
      - echo -e "\e[1;32m✅ データベースのセットアップが完了しました\e[0m"

  db:push:
    desc: 'データベースにPrismaスキーマを適用'
    cmds:
      - npx prisma db push

  db:migrate:
    desc: 'マイグレーションを作成・実行'
    cmds:
      - npx prisma migrate dev

  db:seed:
    desc: 'シードデータを投入'
    cmds:
      - npx prisma db seed

  db:studio:
    desc: 'Prisma Studioを起動（GUIでDBを確認）'
    cmds:
      - npx prisma studio

  db:reset:
    desc: 'データベースをリセット（全データ削除 + 再セットアップ）'
    cmds:
      - echo -e "\e[1;31m⚠️  データベースの全データを削除します\e[0m"
      - npx prisma migrate reset --force
      - task: db:seed

  # ----- 生成系コマンド

  gen-env:
    desc: '.envファイルを生成'
    cmds:
      - echo -e "\e[1;33m.envファイルが存在するか確認しています...\e[0m"
      - cmd: |
          if [ ! -f .env ]; then
            cp .env.example .env
            echo -e "\e[1;32m.envファイルを作成しました\e[0m"
            echo -e "\e[1;31m⚠️  .envの中に正しい値を入力して下さい\e[0m"
            exit 1
          else
            echo -e "\e[1;32m.envファイルは既に存在します\e[0m"
          fi

  prisma:generate:
    desc: 'Prisma Clientを生成'
    cmds:
      - npx prisma generate

  # ----- 削除系コマンド

  clean:
    desc: '自動生成されたファイル・フォルダを削除'
    cmds:
      - rm -rf .next node_modules

  docker-clean:
    desc: 'このリポジトリに関するDockerリソースを全部破棄する'
    cmds:
      - echo -e "\e[1;33mDockerリソースを破棄しています...\e[0m"
      - docker compose down -v
      - echo -e "\e[1;32mDockerリソースの破棄が完了しました\e[0m"

  clear:
    desc: 'すべて破棄（再構築はしない）'
    cmds:
      - task: clean
      - task: docker-clean

  # ----- ビルド・テストコマンド

  build:
    desc: 'Next.jsアプリケーションをビルド'
    cmds:
      - npm run build

  test:
    desc: 'テストを実行'
    cmds:
      - npm run test

  lint:
    desc: 'Lintを実行'
    cmds:
      - npm run lint

  # ----- util系コマンド

  npmi:
    desc: 'npm ciコマンドをコンテナで実行'
    cmds:
      - docker compose run --rm frontend npm ci

  logs:
    desc: 'Docker Composeのログを表示'
    cmds:
      - docker compose logs -f

  ps:
    desc: '実行中のコンテナ一覧を表示'
    cmds:
      - docker compose ps
