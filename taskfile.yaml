# https://taskfile.dev

version: '3'

dotenv:
  - .env

tasks:
  default:
    cmds:
      - task -l

  init:
    desc: "初期セットアップ"
    cmds:
      - pnpm install
      - cp -n .env.example .env || true
      - echo "✅ Setup complete"

  up:
    desc: "開発サーバー起動"
    cmds:
      - pnpm dev

  healthcheck:
    desc: "動作確認（型チェック・テスト・ビルド）"
    cmds:
      - pnpm -r type-check
      - pnpm -r --if-present test
      - pnpm build
      - echo "✅ Health check passed"
