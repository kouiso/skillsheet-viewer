name: PR Setting

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-setting:
    name: PR auto assign and labels
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR author
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [author],
            });
            core.info(`Assigned PR author: ${author}`);

      - name: Ensure managed labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'feature', color: '0e8a16', description: '新機能・機能改修' },
              { name: 'bug', color: 'd73a4a', description: 'バグ修正' },
              { name: 'release', color: '5319e7', description: 'リリース作業' },
              { name: 'hotfix', color: 'b60205', description: '緊急修正' },
              { name: 'support', color: 'c5def5', description: 'サポート作業' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
                core.info(`Label already exists: ${label.name}`);
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                core.info(`Created label: ${label.name}`);
              }
            }

      - name: Add label based on branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const prefixLabels = [
              { prefix: 'feature/', label: 'feature' },
              { prefix: 'bugfix/', label: 'bug' },
              { prefix: 'fix/', label: 'bug' },
              { prefix: 'release/', label: 'release' },
              { prefix: 'hotfix/', label: 'hotfix' },
              { prefix: 'support/', label: 'support' },
            ];
            const matched = prefixLabels.find(({ prefix }) => branchName.startsWith(prefix));

            if (!matched) {
              core.info(`No managed label mapping for branch: ${branchName}`);
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [matched.label],
            });
            core.info(`Added label '${matched.label}' for branch '${branchName}'.`);
